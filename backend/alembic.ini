# Alembic Configuration File
# This file is read by Alembic when running `alembic` commands.
# The sqlalchemy.url is overridden in env.py to read from app settings.

[alembic]
script_location = alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
prepend_sys_path = .
truncate_slug_length = 40
timezone = UTC

# Max length of a single migration script (bytes). 0 = no limit.
sourceless = false

# Override in env.py — do not put real credentials here.
sqlalchemy.url = postgresql+asyncpg://nesya:password@localhost:5432/nesya_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
